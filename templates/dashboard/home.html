{% extends 'layouts/base.html' %}

{% block title %}
Dashboard
{% endblock %}

{% block content %}

<h2 class="mb-4">
    Dashboard
</h2>

<div class="row g-4">

    <div class="col-md-3">

        <div class="card">

            <div class="card-body">

                <h1>
                    {{ total_tickets }}
                </h1>

                <p>
                    Total de Chamados
                </p>

            </div>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card">

            <div class="card-body">

                <h1>
                    {{ open_tickets }}
                </h1>

                <p>
                    Abertos
                </p>

            </div>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card">

            <div class="card-body">

                <h1>
                    {{ analysis_tickets }}
                </h1>

                <p>
                    Em Análise
                </p>

            </div>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card">

            <div class="card-body">

                <h1>
                    {{ resolved_tickets }}
                </h1>

                <p>
                    Resolvidos
                </p>

            </div>

        </div>

    </div>

</div>

<div class="row mt-4">

    <div class="col-md-3">

        <div class="card border-danger">

            <div class="card-body">

                <h1>
                    {{ critical_tickets }}
                </h1>

                <p>
                    Críticos
                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}
