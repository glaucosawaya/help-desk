{% load static %}

<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>
        {% block title %}
        Help Desk
        {% endblock %}
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{% static 'css/auth.css' %}">

</head>

<body>

<div class="container">

    <div class="row justify-content-center align-items-center login-wrapper">

        <div class="col-md-5 col-lg-4">

            {% block content %}
            {% endblock %}

        </div>

    </div>

</div>

</body>

</html>
